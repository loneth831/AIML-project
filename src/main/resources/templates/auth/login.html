<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Recruitment System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .login-header {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border-radius: 15px 15px 0 0;
            color: white;
        }
        .login-btn {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: none;
            transition: transform 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
        }
        .form-control:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 0 0.25rem rgba(108, 92, 231, 0.25);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="login-card">
                <!-- Header -->
                <div class="login-header text-center p-4">
                    <h2><i class="bi bi-robot"></i> AI Recruitment System</h2>
                    <p class="mb-0">Intelligent Candidate Matching Platform</p>
                </div>

                <!-- Body -->
                <div class="card-body p-4">

                    <!-- Success/Error Messages -->
                    <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
                        <span th:text="${message}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <h4 class="text-center mb-4">Login to Your Account</h4>

                    <form th:action="@{/auth/login}" method="post">

                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                <i class="bi bi-person"></i> Username
                            </label>
                            <input type="text"
                                   class="form-control"
                                   id="username"
                                   name="username"
                                   required
                                   placeholder="Enter your username">
                        </div>

                        <!-- Password -->
                        <div class="mb-4">
                            <label for="password" class="form-label">
                                <i class="bi bi-lock"></i> Password
                            </label>
                            <input type="password"
                                   class="form-control"
                                   id="password"
                                   name="password"
                                   required
                                   placeholder="Enter your password">
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid mb-4">
                            <button type="submit" class="btn login-btn text-white py-2">
                                <i class="bi bi-box-arrow-in-right"></i> Login
                            </button>
                        </div>

                    </form>

                    <!-- Register Link -->
                    <div class="text-center">
                        <p class="mb-2">Don't have an account?</p>
                        <a th:href="@{/auth/register}" class="btn btn-outline-primary">
                            <i class="bi bi-person-plus"></i> Register Now
                        </a>
                    </div>

                </div>
            </div>

            <!-- Footer -->
            <div class="text-center mt-4">
                <p class="text-white mb-0">
                    &copy; 2026 AI Recruitment System
                </p>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
